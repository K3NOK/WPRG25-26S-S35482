<!DOCTYPE html>
<html>
<head>
    <h1>Formularz rejestracyjny do Biblioteki Akademickiej.</h1>
</head>
<body>
<form method="post" action="Rejestracja.php" enctype="multipart/form-data">
    <fieldset>
        <legend>Dane osobowe</legend>
            <label>Imię:</label><br><input type="text" name="imie" required minlength="2" maxlength="50" placeholder="plejsholder" autofocus><br>
            <label>Nazwisko:</label><br><input type="text" required maxlength="60"><br>
            <label>Adres e-mail:<br><input type="email" required multiple></label><br>
            <label>Nr. tel.:<br><input type="tel" pattern="[0-9]{9}"></label><br>
            <label>Data ur.:<br><input type="date" min="1900-01-01" max="2026-01-01"></label><br>
            <label>Płeć:<br></label>
                <label><input type="radio" name="plec">Kobieta <input type="radio" name="plec">Mezczyzna <input type="radio" name="plec">Inna </label><br>
            <label>Nr. PESEL:<br><input type="password" pattern="[0-9]{11}"></label><br>
    </fieldset>
    <fieldset>
        <legend>Adres</legend>
        <label>Ulica i numer:<br><input type="text" required></label><br>
        <label>Kod pocztowy:<br><input type="text" pattern="[0-9]{2}-[0-9]{3}" placeholder="00-000"></label><br>
        <label>Miasto:<br><input list="lista-miast" required/></label><br>
        <label>Kraj:<br><select id="kraj" name="kraj" required>
            <optgroup label="Europa">
                <option selected>Polska</option>
                <option>Niemcy</option>
                <option>Francja</option>
                <option>Włochy</option>
            </optgroup>

            <optgroup label="Northern Plateau">
                <option>Norm Company Territory</option>
                <option>Kino Pass</option>
                <option>Decke Region</option>
                <option>Ende</option>
            </optgroup>
        </select></label>
    </fieldset>
    <fieldset>
        <legend>Preferencje czytelnicze</legend>
        
    </fieldset>
</form>

<datalist id="lista-miast">
    <option value="Warszawa"></option>
    <option value="Kraków"></option>
    <option value="Frieren the demon slayer(city)"></option>
    <option value="Gdańsk"></option>
    <option value="Spółka Zło Dundersztyca(city)"></option>
    <option value="Pepe_Pan_Dziobak(city)"></option>
    <option value="Ferb(city)"></option>
    <option value="Fineasz(city)"></option>
</datalist>



</body>
</html>
